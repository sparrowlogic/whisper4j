name: Release to Maven Central

on:
  push:
    tags: [ '*' ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '26'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Set version from tag
        run: ./mvnw -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        run: ./mvnw -B -Prelease deploy -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ''

  native-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: whisper4j-macos-aarch64
          - os: ubuntu-latest
            artifact: whisper4j-linux-amd64
    runs-on: ${{ matrix.os }}
    name: native (${{ matrix.artifact }})

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '26'
          distribution: 'graalvm'
          cache: maven

      - name: Set version from tag
        run: ./mvnw -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Build native binary
        run: ./mvnw -B package -Pnative -DskipTests

      - name: Upload release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" target/whisper4j#${{ matrix.artifact }}
