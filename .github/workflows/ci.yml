name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '26'
          cache: maven

      - name: Compile (multi-release JAR)
        run: ./mvnw -B compile

      - name: Checkstyle
        run: ./mvnw -B checkstyle:check

      - name: Spotless
        run: ./mvnw -B spotless:check

      - name: Tests (scalar path — no Vector API)
        run: ./mvnw -B test

      - name: Tests (SIMD path — with Vector API)
        run: ./mvnw -B test -Pvector-api

  publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete existing package
        run: |
          gh api --method DELETE /user/packages/maven/io.github.sparrowlogic.whisper4j || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: '26'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set SNAPSHOT version from git
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${TAG#v}-SNAPSHOT"
          ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Publish to GitHub Packages
        run: ./mvnw -B deploy -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
